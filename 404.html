<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found — Glowmi</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #F5F0FF 0%, #fce4ec 50%, #f3e5f5 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 24px;
            padding: 50px 30px;
            max-width: 480px;
            box-shadow: 0 8px 32px rgba(196, 69, 105, 0.1);
        }
        .emoji { font-size: 4rem; margin-bottom: 20px; }
        h1 { color: #6C5FA7; font-size: 1.8rem; margin-bottom: 8px; }
        h2 { color: #888; font-size: 1rem; font-weight: 400; margin-bottom: 24px; }
        p { color: #666; line-height: 1.6; margin-bottom: 30px; }
        .links { display: flex; flex-direction: column; gap: 12px; }
        a {
            display: block;
            padding: 14px 24px;
            background: linear-gradient(135deg, #8B7EC8, #6C5FA7);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        a:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(196, 69, 105, 0.3); }
        a.secondary { background: #f8f9fa; color: #6C5FA7; }
        a.secondary:hover { background: #F5F0FF; }
    </style>
</head>
<body>
    <div class="container">
        <div class="emoji">😢</div>
        <h1>Page Not Found</h1>
        <h2>페이지를 찾을 수 없습니다</h2>
        <p>The page you're looking for doesn't exist or has been moved.<br>찾으시는 페이지가 존재하지 않거나 이동되었습니다.</p>
        <div class="links">
            <a href="/">✨ Go to Glowmi Home 홈으로 가기</a>
            <a href="/#ai" class="secondary">🎨 Try AI Beauty Analysis AI 뷰티 분석</a>
            <a href="/#quiz" class="secondary">🔬 Take Skin Quiz 피부 퀴즈</a>
        </div>
    </div>
</body>
</html>
