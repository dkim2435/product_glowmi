name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint (ESLint)
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Pre-push checks (version sync, JSON-LD, robots.txt, etc.)
        run: npm run pre-push

  quality-gate:
    name: Quality Summary
    runs-on: ubuntu-latest
    needs: lint-and-build
    if: always()
    steps:
      - name: Check results
        run: |
          if [ "${{ needs.lint-and-build.result }}" = "failure" ]; then
            echo "❌ CI failed — check lint/build/pre-push errors above"
            exit 1
          fi
          echo "✅ All checks passed — ready to deploy"
